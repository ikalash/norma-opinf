name: Python CI (Conda)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: macos-latest

    steps:
    # ------------------------------------------------------------
    # Checkout
    # ------------------------------------------------------------
    - name: Checkout code
      uses: actions/checkout@v4

    # ------------------------------------------------------------
    # Conda (Python stack)
    # ------------------------------------------------------------
    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.12"
        activate-environment: norma-ci
        environment-name: norma-ci

    - name: Verify Conda Python
      shell: bash -l {0}
      run: |
        which python
        python -c "import sys; print(sys.version)"
        conda info

    # ------------------------------------------------------------
    # Clone Norma.jl
    # ------------------------------------------------------------
    - name: Clone Norma.jl
      run: |
        git clone -n --depth=1 --filter=tree:0 https://github.com/sandialabs/Norma.jl.git
        cd Norma.jl
        git sparse-checkout set --no-cone /src /Project.toml
        git checkout

    # ------------------------------------------------------------
    # Julia
    # ------------------------------------------------------------
    - name: Set up Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.11'

    - name: Cache Julia artifacts
      uses: julia-actions/cache@v2

    # ------------------------------------------------------------
    # Julia + PyCall (Conda-managed)
    # ------------------------------------------------------------
    - name: Setup Norma.jl with PyCall (Conda)
      shell: bash -l {0}
      run: |
        cd Norma.jl
        julia --project=. -e '
          import Pkg

          # Force PyCall to use Conda
          ENV["PYCALL_USE_CONDA"] = "1"

          Pkg.instantiate()
          Pkg.add("PyCall")
          Pkg.build("PyCall")

          using PyCall
          @info "PyCall.python" PyCall.python
          @info "PyCall.libpython" PyCall.libpython

          pyimport("sys")
          pyimport("platform")
        '

    # ------------------------------------------------------------
    # Python dependencies (inside Conda env)
    # ------------------------------------------------------------
    - name: Install Python dependencies
      shell: bash -l {0}
      run: |
        pip install --upgrade pip
        pip install .

    # ------------------------------------------------------------
    # Tests
    # ------------------------------------------------------------
    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest --norma="julia --project=$GITHUB_WORKSPACE/Norma.jl $GITHUB_WORKSPACE/Norma.jl/src/Norma.jl"

