name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: macos-latest

    steps:
    # ------------------------------------------------------------
    # Checkout
    # ------------------------------------------------------------
    - name: Checkout code
      uses: actions/checkout@v4

    # ------------------------------------------------------------
    # Python
    # ------------------------------------------------------------
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Capture Python path
      run: |
        echo "PYTHON_PATH=$(python -c 'import sys; print(sys.executable)')" >> $GITHUB_ENV
        python -c "import sys; print(sys.version)"
        which python

    # ------------------------------------------------------------
    # Clone Norma.jl (sparse checkout)
    # ------------------------------------------------------------
    - name: Clone Norma.jl
      run: |
        git clone -n --depth=1 --filter=tree:0 https://github.com/sandialabs/Norma.jl.git
        cd Norma.jl
        git sparse-checkout set --no-cone /src /Project.toml
        git checkout

    # ------------------------------------------------------------
    # Julia
    # ------------------------------------------------------------
    - name: Set up Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.11'

    - name: Cache Julia artifacts
      uses: julia-actions/cache@v2

    # ------------------------------------------------------------
    # Julia + PyCall (BOUND TO PYTHON)
    # ------------------------------------------------------------
    - name: Setup Norma.jl and PyCall
      env:
        PYTHON: ${{ env.PYTHON_PATH }}
      run: |
        cd Norma.jl
        julia --project=. -e '
          import Pkg
          ENV["PYTHON"] = ENV["PYTHON"]
          @info "Using PYTHON" ENV["PYTHON"]

          Pkg.instantiate()
          Pkg.add("PyCall")
          Pkg.build("PyCall")

          using PyCall
          @info "PyCall bound python" PyCall.python
          @info "PyCall libpython" PyCall.libpython

          pyimport("sys")
          pyimport("platform")
        '

    # ------------------------------------------------------------
    # Python package install
    # ------------------------------------------------------------
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install .

    # ------------------------------------------------------------
    # Tests
    # ------------------------------------------------------------
    - name: Run tests
      run: |
        pytest --norma="julia --project=$GITHUB_WORKSPACE/Norma.jl $GITHUB_WORKSPACE/Norma.jl/src/Norma.jl"

